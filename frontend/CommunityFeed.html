<head>

    <!-- Google Fonts: Plus Jakarta Sans for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette Design Tokens */
            --primary: #0B525B;
            --primary-light: #EAF3F4;
            --primary-hover: #083E45;
            --accent: #EBA036;
            --accent-light: #FEF6EC;
            --bg-body: #FAFAF8;
            --bg-card: #FFFFFF;
            --text-main: #1D2D30;
            --text-muted: #6B7280;
            --border: #ECECEC;
            
            /* Status Colors */
            --red-light: #FEECEB;
            --red-dark: #EB5757;
            --green-light: #ECFDF3;
            --green-dark: #039855;
            --orange-light: #FFF5EC;
            --orange-dark: #E47A22;
            
            /* Typography & Shadows */
            --font-family: 'Plus Jakarta Sans', sans-serif;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 8px 16px rgba(0, 0, 0, 0.06);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Structure */
        .dashboard-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 272px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 20px 32px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            overflow-y: auto; /* make side bar scrollable */
            scrollbar-width: none; /* hide Firefox scrollbar */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            display: none; /* hide Chrome/Safari scrollbar */
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 12px 8px;
        }

        .logo-img {
            max-width: 140px; /* reduced logo size */
            height: auto;
            object-fit: contain;
        }

        /* Nav Links */
        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-item a i, .nav-item a svg {
            width: 22px;
            height: 22px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .nav-item a:hover {
            background-color: var(--bg-body);
            color: var(--primary);
        }

        .nav-item a:hover i, .nav-item a:hover svg {
            transform: translateX(2px);
        }

        /* Active Link Styling */
        .nav-item.active a {
            background-color: var(--primary);
            color: #FFFFFF;
        }

        .nav-item.active a:hover {
            background-color: var(--primary-hover);
        }

        /* Badges */
        .badge {
            margin-left: auto;
            background-color: var(--accent);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
            box-shadow: 0 2px 6px rgba(235, 160, 54, 0.3);
        }

        /* Logout Container */
        .nav-logout {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .nav-logout a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-logout a:hover {
            background-color: #FFF5F5;
            color: var(--red-dark);
        }

        /* Main Workspace Wrapper */
        .main-wrapper {
            margin-left: 272px;
            width: calc(100% - 272px);
            min-width: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 32px 32px;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Topbar Header styling */
        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 2.1fr) minmax(410px, 1fr);
            align-items: center;
            margin-bottom: 32px;
            gap: 24px;
        }

        .topbar-main {
            display: flex;
            align-items: center;
            gap: 24px;
            min-width: 0;
        }

        /* Sidebar Toggle Button */
        .sidebar-toggle-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .sidebar-toggle-btn:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .sidebar-toggle-btn i, .sidebar-toggle-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Collapsed States */
        .sidebar-collapsed .sidebar {
            transform: translateX(-100%);
        }

        .sidebar-collapsed .main-wrapper {
            margin-left: 0;
            width: 100%;
        }

        @media (max-width: 900px) {
            .sidebar-collapsed .sidebar {
                transform: translateX(-100%);
            }
            .sidebar-collapsed .main-wrapper {
                margin-left: 0;
                width: 100%;
            }
        }

        .search-container {
            position: relative;
            flex-grow: 1;
            min-width: 0;
            max-width: none;
        }

        .search-container i, .search-container svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 20px;
            height: 20px;
            z-index: 2; /* ensure it stays visible on top of input bg */
        }

        .search-input {
            width: 100%;
            height: 48px;
            padding: 12px 20px 12px 52px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background-color: var(--bg-card);
            font-family: var(--font-family);
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 82, 91, 0.08);
        }

        /* Topbar actions (badges, user info) */
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 24px;
            justify-content: flex-start;
            min-width: 0;
            position: relative;
        }

        .icon-btn-badge {
            position: relative;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .icon-btn-badge:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-btn-badge .badge-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: var(--accent);
            color: #FFFFFF;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-card);
            box-shadow: 0 2px 4px rgba(235, 160, 54, 0.3);
            flex-shrink: 0;
        }

        .user-menu-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 6px 18px 6px 8px;
            border-radius: 99px;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .user-menu-trigger:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .user-avatar-circle {
            background-color: var(--primary);
            color: #FFFFFF;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .user-name {
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .user-role {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            line-height: 1.2;
            margin-top: 1px;
        }

        .user-menu-trigger i, .user-menu-trigger svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* User Dropdown Menu */
        .user-dropdown {
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            width: 280px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .user-dropdown.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
        }

        .dropdown-avatar {
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .dropdown-user-info {
            display: flex;
            flex-direction: column;
        }

        .dropdown-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .dropdown-role {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--border);
            margin: 0 0;
        }

        .dropdown-menu {
            list-style: none;
            padding: 8px 0;
            margin: 0;
        }

        .dropdown-menu li {
            margin: 0;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .dropdown-item:hover {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .dropdown-item i, .dropdown-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .logout-item {
            color: var(--red-dark);
        }

        .logout-item:hover {
            background-color: var(--red-light);
            color: var(--red-dark);
        }

        /* React App Containers */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #root {
            width: 100%;
        }

        /* Responsive Breakpoints */
        @media (max-width: 1200px) {
            .topbar {
                grid-template-columns: 1fr;
            }
            .topbar-actions {
                justify-content: flex-start;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 72px;
                padding: 24px 8px;
                align-items: center;
            }
            .logo-title, .logo-subtitle, .nav-item a span, .nav-logout a span, .badge, .logo-img {
                display: none;
            }
            .logo-container {
                margin-bottom: 24px;
            }
            .main-wrapper {
                margin-left: 72px;
                width: calc(100% - 72px);
                padding: 16px;
            }
        }

        @media (max-width: 600px) {
            .topbar {
                gap: 12px;
                margin-bottom: 20px;
            }
            .topbar-main {
                gap: 10px;
            }
            .sidebar-toggle-btn {
                width: 42px;
                height: 42px;
            }
            .sidebar-toggle-btn i, .sidebar-toggle-btn svg {
                width: 20px;
                height: 20px;
            }
            .search-input {
                height: 42px;
                padding: 10px 14px 10px 42px;
                border-radius: 13px;
                font-size: 13px;
            }
            .search-container i, .search-container svg {
                left: 14px;
                width: 17px;
                height: 17px;
            }
            .topbar-actions {
                justify-content: flex-start;
                gap: 8px;
                flex-wrap: nowrap;
                width: 100%;
                overflow: hidden;
            }
            .icon-btn-badge {
                width: 42px;
                height: 42px;
                flex: 0 0 42px;
            }
            .icon-btn-badge .badge-dot {
                width: 16px;
                height: 16px;
                font-size: 9px;
            }
            .user-menu-trigger {
                flex: 1 1 auto;
                min-width: 0;
                height: 42px;
                gap: 8px;
                padding: 4px 10px 4px 6px;
            }
            .user-avatar-circle {
                width: 34px;
                height: 34px;
                font-size: 12px;
            }
            .user-details {
                min-width: 0;
            }
            .user-name {
                font-size: 12.5px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .user-role {
                display: none;
            }
            .user-menu-trigger i, .user-menu-trigger svg {
                width: 14px;
                height: 14px;
                margin-left: 0;
                flex-shrink: 0;
            }
            .user-dropdown {
                width: 260px;
                right: -8px;
            }
            .dropdown-header {
                padding: 16px 20px;
            }
            .dropdown-avatar {
                width: 42px;
                height: 42px;
                font-size: 14px;
            }
            .dropdown-name {
                font-size: 13px;
            }
            .dropdown-role {
                font-size: 11px;
            }
            .dropdown-item {
                padding: 10px 20px;
                font-size: 13px;
            }
            .dropdown-item i, .dropdown-item svg {
                width: 16px;
                height: 16px;
            }
        }

    <script>
        lucide.createIcons();
        
        // =========================
// Sidebar Toggle
// =========================

const sidebar = document.querySelector(".sidebar");
const toggle = document.getElementById("sidebarToggle");

// Open / Close Sidebar
toggle.addEventListener("click", function (e) {
    e.stopPropagation();
    document.body.classList.toggle("sidebar-collapsed");
});

// Close when clicking outside
document.addEventListener("click", function (e) {

    if (
        !document.body.classList.contains("sidebar-collapsed") &&
        !sidebar.contains(e.target) &&
        !toggle.contains(e.target)
    ) {
        document.body.classList.add("sidebar-collapsed");
    }

});

// Track whether the mouse is over the sidebar
let isSidebarHovered = false;

sidebar.addEventListener("mouseenter", () => {
    isSidebarHovered = true;
});

sidebar.addEventListener("mouseleave", () => {
    isSidebarHovered = false;
});

// Close sidebar on scroll ONLY if the mouse is NOT over the sidebar
window.addEventListener("scroll", () => {

    if (
        !document.body.classList.contains("sidebar-collapsed") &&
        !isSidebarHovered
    ) {
        document.body.classList.add("sidebar-collapsed");
    }

});

// Close sidebar on mouse wheel ONLY if the mouse is NOT over the sidebar
window.addEventListener("wheel", () => {

    if (
        !document.body.classList.contains("sidebar-collapsed") &&
        !isSidebarHovered
    ) {
        document.body.classList.add("sidebar-collapsed");
    }

});

// Close on touch devices
window.addEventListener("touchmove", function () {

    if (!document.body.classList.contains("sidebar-collapsed")) {
        document.body.classList.add("sidebar-collapsed");
    }

});

// Close after clicking any sidebar link
document.querySelectorAll(".sidebar a").forEach(link => {

    link.addEventListener("click", () => {

        document.body.classList.add("sidebar-collapsed");

    });

});

// Close when ESC key is pressed
document.addEventListener("keydown", function (e) {

    if (e.key === "Escape") {
        document.body.classList.add("sidebar-collapsed");
