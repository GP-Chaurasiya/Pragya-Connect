<head>

    <title>Pragya Connect - Community Feed</title>
    <!-- Google Fonts: Plus Jakarta Sans for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
    /* =========================
       PYSHK Brand Theme
    ========================== */

    /* Primary */
    --primary: #00381F;
    --primary-hover: #00522E;
    --primary-light: #E8F2ED;

    /* Accent */
    --accent: #D9AE29;
    --accent-hover: #C89D1F;
    --accent-light: #FFF8E6;

    /* Supporting Colors */
    --olive: #9D9D48;
    --terracotta: #944426;
    --burgundy: #620513;

    /* Backgrounds */
    --bg-body: #F5EFE5;
    --bg-card: #FFFFFF;
    --bg-sidebar: #00381F;
    --bg-soft: #FAF8F4;

    /* Typography */
    --text-main: #272727;
    --text-heading: #00381F;
    --text-muted: #6F6F6F;
    --text-light: #FFFFFF;

    /* Borders */
    --border: #E5DDD2;

    /* Status */
    --success: #0F8A4B;
    --success-bg: #EAF8F1;

    --warning: #D9AE29;
    --warning-bg: #FFF8E6;

    --danger: #620513;
    --danger-bg: #F8EDEE;

    --info: #944426;
    --info-bg: #F9F0EC;

    /* Shadows */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);

    /* Radius */
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 22px;

    /* Animation */
    --transition: all 0.3s ease;
}

/* Headings */
h1,h2,h3,h4,h5,h6{
    font-family:"BN Cringe Serif", serif;
    font-weight:400;
    color:var(--text-heading);
}

/* Body */
body,
p,
button,
input,
textarea,
select{
    font-family:"Neue Montreal",sans-serif;
}

/* Hero text / Quotes */
.quote,
.hero-title,
.event-title{
    font-family:"Canela",serif;
}

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout Structure */
        .dashboard-container {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 272px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 20px 32px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            overflow-y: auto; /* make side bar scrollable */
            scrollbar-width: none; /* hide Firefox scrollbar */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            display: none; /* hide Chrome/Safari scrollbar */
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 12px 8px;
        }

        .logo-img {
            max-width: 140px; /* reduced logo size */
            height: auto;
            object-fit: contain;
        }

        /* Nav Links */
        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-item a i, .nav-item a svg {
            width: 22px;
            height: 22px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .nav-item a:hover {
            background-color: var(--bg-body);
            color: var(--primary);
        }

        .nav-item a:hover i, .nav-item a:hover svg {
            transform: translateX(2px);
        }

        /* Active Link Styling */
        .nav-item.active a {
            background-color: var(--primary);
            color: #FFFFFF;
        }

        .nav-item.active a:hover {
            background-color: var(--primary-hover);
        }

        /* Badges */
        .badge {
            margin-left: auto;
            background-color: var(--accent);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
            box-shadow: 0 2px 6px rgba(235, 160, 54, 0.3);
        }

        /* Logout Container */
        .nav-logout {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .nav-logout a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-logout a:hover {
            background-color: #FFF5F5;
            color: var(--red-dark);
        }

        /* Main Workspace Wrapper */
        .main-wrapper {
            margin-left: 272px;
            width: calc(100% - 272px);
            min-width: 0;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 32px 32px;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow:visible
        }

        /* Topbar Header styling */
        .topbar {
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:16px;
            width:100%;
            margin-bottom:24px;
            flex-wrap:nowrap;
            overflow: visible;
        }

        .topbar-main {
            display:flex;
            align-items:center;
            gap:16px;
            flex:1;
            min-width:0;
        }

        /* Sidebar Toggle Button */
        .sidebar-toggle-btn {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            flex-shrink: 0;
        }

        .sidebar-toggle-btn:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .sidebar-toggle-btn i, .sidebar-toggle-btn svg {
            width: 22px;
            height: 22px;
        }

        /* Collapsed States */
        .sidebar-collapsed .sidebar {
            transform: translateX(-100%);
        }

        .sidebar-collapsed .main-wrapper {
            margin-left: 0;
            width: 100%;
        }

        @media (max-width: 900px) {
            .sidebar-collapsed .sidebar {
                transform: translateX(-100%);
            }
            .sidebar-collapsed .main-wrapper {
                margin-left: 0;
                width: 100%;
            }
        }

        .search-container{
    position:relative;
    flex:1 1 auto;
    min-width:0;
    max-width:100%;
}

        .search-container i, .search-container svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 20px;
            height: 20px;
            z-index: 2; /* ensure it stays visible on top of input bg */
        }

        .search-input {
            width: 100%;
            height: 48px;
            padding: 12px 20px 12px 52px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background-color: var(--bg-card);
            font-family: var(--font-family);
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(11, 82, 91, 0.08);
        }

        /* Topbar actions (badges, user info) */
        .topbar-actions{
            display:flex;
            align-items:center;
            gap:10px;
            flex:0 0 auto;
            margin-left:auto;
            position:relative;
            width:auto;
            overflow:visible;
        }

        .icon-btn-badge {
            position: relative;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .icon-btn-badge:hover {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .icon-btn-badge .badge-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: var(--accent);
            color: #FFFFFF;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-card);
            box-shadow: 0 2px 4px rgba(235, 160, 54, 0.3);
            flex-shrink: 0;
        }

        .user-menu-trigger{
            display:flex;
            align-items:center;
            gap:10px;
            background:#fff;
            border:1px solid var(--border);
            border-radius:999px;
            padding:6px 16px 6px 8px;
            cursor:pointer;
            box-shadow:var(--shadow-sm);
            transition:.3s;
        }

        .user-menu-trigger:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .user-avatar-circle {
            background-color: var(--primary);
            color: #FFFFFF;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .user-details {
            display: flex;
            flex-direction: column;
            text-align: left;
            min-width: 0;
        }

        .user-name {
            max-width:120px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .user-role {
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
            line-height: 1.2;
            margin-top: 1px;
        }

        .user-menu-trigger i, .user-menu-trigger svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        /* User Dropdown Menu */
        .user-dropdown{
            position:absolute;
            top:calc(100% + 10px);
            right:0;
            width:280px;
            background:#fff;
            border:1px solid var(--border);
            border-radius:20px;
            box-shadow:0 16px 40px rgba(0,0,0,.15);
            opacity:0;
            visibility:hidden;
            pointer-events:none;
            transform:translateY(-8px);
            transition:.25s;
            z-index:999999;
        }

        .user-dropdown.active{
            opacity:1;
            visibility:visible;
            pointer-events:auto;
            transform:translateY(0);
        }

        .dropdown-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 20px 24px;
        }

        .dropdown-avatar {
            width: 48px;
            height: 48px;
            background-color: var(--primary);
            color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .dropdown-user-info {
            display: flex;
            flex-direction: column;
        }

        .dropdown-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .dropdown-role {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .dropdown-divider {
            height: 1px;
            background-color: var(--border);
            margin: 0 0;
        }

        .dropdown-menu {
            list-style: none;
            padding: 8px 0;
            margin: 0;
        }

        .dropdown-menu li {
            margin: 0;
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            color: var(--text-main);
            text-decoration: none;
            font-family: var(--font-family);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .dropdown-item:hover {
            background-color: var(--primary-light);
            color: var(--primary);
        }

        .dropdown-item i, .dropdown-item svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .logout-item {
            color: var(--red-dark);
        }

        .logout-item:hover {
            background-color: var(--red-light);
            color: var(--red-dark);
        }

        /* React App Containers */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        #root {
            width: 100%;
        }

        /* Responsive Breakpoints */
@media (max-width:992px){

    .topbar{
        position:relative;
        gap:12px;
    }

    .search-container{
        min-width:100px;
    }

    .user-role{
        display:none;
    }

    .user-name{
        max-width:90px;
        font-size:13px;
    }

}

        @media (max-width: 900px) {
            .sidebar {
                width: 72px;
                padding: 24px 8px;
                align-items: center;
            }
            .logo-title, .logo-subtitle, .nav-item a span, .nav-logout a span, .badge, .logo-img {
                display: none;
            }
            .logo-container {
                margin-bottom: 24px;
            }
            .main-wrapper {
                margin-left: 72px;
                width: calc(100% - 72px);
                padding: 16px;
            }
        }

        @media (max-width: 600px) {
            .topbar {
                position:relative;
                gap: 12px;
                margin-bottom: 20px;
            }
            .topbar-main {
                gap: 10px;
            }
            .sidebar-toggle-btn {
                width: 42px;
                height: 42px;
            }
            .sidebar-toggle-btn i, .sidebar-toggle-btn svg {
                width: 20px;
                height: 20px;
            }
            .search-input {
                height: 42px;
                padding: 10px 14px 10px 42px;
                border-radius: 13px;
                font-size: 13px;
            }
            .search-container i, .search-container svg {
                left: 14px;
                width: 17px;
                height: 17px;
            }
            .topbar-actions {
                justify-content: flex-start;
                gap: 8px;
                flex-wrap: nowrap;
                width:auto;
                overflow:visible;
            }
            .icon-btn-badge {
                width: 42px;
                height: 42px;
                flex: 0 0 42px;
            }
            .icon-btn-badge .badge-dot {
                width: 16px;
                height: 16px;
                font-size: 9px;
            }
            .user-menu-trigger {
                flex:0 0 auto;
                min-width: 0;
                gap: 8px;
                padding:0;
                width:42px;
                height:42px;
                justify-content:center;
            }
            .user-avatar-circle {
                width: 34px;
                height: 34px;
                font-size: 12px;
            }
            .user-details {
                display:none;
            }
            .user-name {
                width:42px;
                padding:0;
                justify-content:center;
            }
            .user-role {
                display: none;
            }
            .user-menu-trigger i, .user-menu-trigger svg {
                display:none;
            }
            .user-dropdown {
                width: 260px;
                right:0;
                top:52px;
            }
            .dropdown-header {
                padding: 16px 20px;
            }
            .dropdown-avatar {
                width: 42px;
                height: 42px;
                font-size: 14px;
            }
            .dropdown-name {
                font-size: 13px;
            }
            .dropdown-role {
                font-size: 11px;
            }
            .dropdown-item {
                padding: 10px 20px;
                font-size: 13px;
            }
            .dropdown-item i, .dropdown-item svg {
                width: 16px;
                height: 16px;
            }
        }

@media (max-width:420px){

.topbar{
    position:relative;
    gap:6px;
}

.search-container{
    min-width:60px;
}

.search-input{
    font-size:12px;
    padding-left:38px;
}

.icon-btn-badge{
    width:38px;
    height:38px;
}

.sidebar-toggle-btn{
    width:38px;
    height:38px;
}

}

.search-results{

position:absolute;
top:55px;
left:0;
width:100%;
background:#fff;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
display:none;
overflow:hidden;
z-index:999;

}

.search-item{

padding:14px 18px;
cursor:pointer;
transition:.3s;

}

.search-item:hover{

background:#EAF3F4;

}
    </style>

        const eventsToggle = document.getElementById("eventsToggle");
