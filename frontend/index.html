<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pragya Connect - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Plus Jakarta Sans', sans-serif;
}

body{
    margin:0;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:25px;
}

.login-container{
    width:min(1300px,95%);
    display:flex;
    background:#fff;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.12);
}

.login-right{
    width:45%;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.login-box{
    width:100%;
    max-width:380px;
}

.login-header{
text-align:center;
}

.login-header img{
width:100px;
height:100px;
object-fit:contain;
}

.login-header h1{
font-size:24px;
color:#0B525B;
font-weight:800;
letter-spacing:1px;
}

.login-left{
    flex:1.2;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:0;
    background:#fff;
}

.login-left img{
    width:100%;
    height:auto;
    display:block;
}

.welcome{
text-align:center;
margin:10px 10px 20px;
}

.welcome h2{
font-size:20px;
color:#111827;
}

.welcome p{
font-size:13px;
color:#6B7280;
margin-top:5px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
font-size:13px;
margin-bottom:6px;
color:#374151;
}

.input-group input{
width:100%;
padding:12px;
border:1px solid #E5E7EB;
border-radius:12px;
outline:none;
transition:0.3s;
}

.input-group input:focus{
border-color:#0B525B;
}

.password-wrapper{
position:relative;
}

.toggle-pass{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#6B7280;
}

.options{
display:flex;
justify-content:space-between;
align-items:center;
font-size:13px;
margin:10px 0 20px;
}

.options a{
color:#0B525B;
text-decoration:none;
}

.btn{
width:100%;
padding:12px;
background:#0B525B;
color:#fff;
border:none;
border-radius:12px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
background:#083E45;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#6B7280;
}

/* Tablets */
@media (max-width:992px){

.login-container{
    flex-direction:column;
    width:100%;
    border-radius:20px;
}

.login-left{
    width:100%;
}

.login-left img{
    width:100%;
    height:auto;
}

.login-right{
    width:100%;
    padding:35px;
}

}

/* Mobile */
@media (max-width:576px){

body{
    padding:0;
    background:#fff;
}

.login-container{
    width:100%;
    min-height:100vh;
    border-radius:0;
    box-shadow:none;
}

.login-left{
    padding:0;
}

.login-left img{
    width:100%;
    height:auto;
    display:block;
}

.login-right{
    padding:25px 20px;
}

.login-header img{
    width:70px;
    height:70px;
}

}


</style>
</head>

<body>
<div class="login-container">
<div class="login-left">
    <img src="assets/poster.png" alt="Pragya Yog School">
</div>
<div class="login-right">
<div class="login-box">

<!-- HEADER -->
<div class="login-header">
    <img src="assets/logo.png" alt="Logo">
</div>

<!-- WELCOME -->
<div class="welcome">
    <h2>Welcome Back</h2>
    <p>Sign in to continue to your dashboard</p>
</div>

<!-- FORM -->
<form id="loginForm">

<div class="input-group">
    <label>Email</label>
    <input type="email" id="email" required>
</div>

<div class="input-group password-wrapper">
    <label>Password</label>
    <input type="password" id="password" required>
    <span class="toggle-pass" onclick="togglePassword()"></span>
</div>

<div class="options">
    <label><input type="checkbox" id="remember"> Remember Me</label>
    <a href="#">Forgot Password?</a>
</div>

<button class="btn" type="submit">Sign In</button>

</form>

<div class="footer">
© 2026 Pragya Connect
</div>

</div>
</div>
</div>

<script>
const BASE_URL = "https://pragya-connect-backend.onrender.com";

// Toggle Password
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// Login Logic
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const response = await fetch(`${BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await response.json();

        if (response.ok) {
            // Save token and user data
            localStorage.setItem("token", data.token);
            localStorage.setItem("userId",data.user.id);

localStorage.setItem("userName",data.user.name);

localStorage.setItem("userEmail",data.user.email);

localStorage.setItem("userRole",data.user.role);

localStorage.setItem(
"userInitials",
data.user.name
.split(" ")
.map(n=>n[0])
.join("")
.toUpperCase()
);
            localStorage.setItem("loggedIn", "true");

            // Remember email
            if (document.getElementById("remember").checked) {
                localStorage.setItem("email", email);
            }

            alert("Login Successful");

            // Redirect
            window.location.href = "dashboard.html";

        } else {
            alert(data.message || "Invalid Credentials");
        }

    } catch (error) {
        console.error(error);
        alert("Server Error");
    }
});

// Auto fill remembered email
window.onload = function() {
    const savedEmail = localStorage.getItem("email");

    if (savedEmail) {
        document.getElementById("email").value = savedEmail;
        document.getElementById("remember").checked = true;
    }
}
</script>

</body>
</html>
