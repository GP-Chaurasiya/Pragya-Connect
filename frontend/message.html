    <style>
        :root {
    /* =========================
       PYSHK Brand Theme
    ========================== */

    /* Primary */
    --primary: #00381F;
    --primary-hover: #00522E;
    --primary-light: #E8F2ED;

    /* Accent */
    --accent: #D9AE29;
    --accent-hover: #C89D1F;
    --accent-light: #FFF8E6;

    /* Supporting Colors */
    --olive: #9D9D48;
    --terracotta: #944426;
    --burgundy: #620513;

    /* Backgrounds */
    --bg-body: #F5EFE5;
    --bg-card: #FFFFFF;
    --bg-sidebar: #00381F;
    --bg-soft: #FAF8F4;

    /* Typography */
    --text-main: #272727;
    --text-heading: #00381F;
    --text-muted: #6F6F6F;
    --text-light: #FFFFFF;

    /* Borders */
    --border: #E5DDD2;

    /* Status */
    --success: #0F8A4B;
    --success-bg: #EAF8F1;

    --warning: #D9AE29;
    --warning-bg: #FFF8E6;

    --danger: #620513;
    --danger-bg: #F8EDEE;

    --info: #944426;
    --info-bg: #F9F0EC;

    /* Shadows */
    --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.12);

    /* Radius */
    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 22px;

    /* Animation */
    --transition: all 0.3s ease;

    --sidebar-width:272px;
}

/* Headings */
h1,h2,h3,h4,h5,h6{
    font-family:"BN Cringe Serif", serif;
    font-weight:400;
    color:var(--text-heading);
}

/* Body */
body,
p,
button,
input,
textarea,
select{
    font-family:"Neue Montreal",sans-serif;
}

/* Hero text / Quotes */
.quote,
.hero-title,
.event-title{
    font-family:"Canela",serif;
}

        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 272px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 20px 32px;
            position: relative;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            overflow-y: auto; /* make side bar scrollable */
            scrollbar-width: none; /* hide Firefox scrollbar */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            display: none; /* hide Chrome/Safari scrollbar */
        }

        /* Logo Area */
        .logo-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 12px 8px;
        }

        .logo-img {
            max-width: 140px; /* reduced logo size */
            height: auto;
            object-fit: contain;
        }

        /* Nav Links */
        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-item a i, .nav-item a svg {
            width: 22px;
            height: 22px;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .nav-item a:hover {
            background-color: var(--bg-body);
            color: var(--primary);
        }

        .nav-item a:hover i, .nav-item a:hover svg {
            transform: translateX(2px);
        }

        /* Active Link Styling */
        .nav-item.active a {
            background-color: var(--primary);
            color: #FFFFFF;
        }

        .nav-item.active a:hover {
            background-color: var(--primary-hover);
        }

        /* Badges */
        .badge {
            margin-left: auto;
            background-color: var(--accent);
            color: #FFFFFF;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 99px;
            box-shadow: 0 2px 6px rgba(235, 160, 54, 0.3);
        }

        /* Logout Container */
        .nav-logout {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }

        .nav-logout a {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 16px;
            transition: var(--transition);
        }

        .nav-logout a:hover {
            background-color: #FFF5F5;
            color: var(--red-dark);
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 72px;
                padding: 24px 8px;
                align-items: center;
            }
            .logo-title, .logo-subtitle, .nav-item a span, .nav-logout a span, .badge, .logo-img {
                display: none;
            }
            .logo-container {
                margin-bottom: 24px;
            }
            .welcome-banner {
                padding: 24px;
            }
            .banner-text {
                max-width: 100%;
            }
            .banner-image-container {
                display: none;
            }
        }

.conversation-panel{
    width:auto;
    min-width:0;
    height:100vh;
    background:var(--bg-card);
    border-right:1px solid var(--border);
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.search-box{
    padding:20px;
    background:#fff;
    border-bottom:1px solid var(--border);
}

.search-box input{
    width:100%;
    padding:14px 18px;
    border-radius:14px;
    border:1px solid var(--border);
    background:var(--bg-body);
    outline:none;
    font-family:inherit;
}

.search-box input:focus{
    border-color:var(--primary);
}

.conversation{
    display:flex;
    align-items:center;
    gap:15px;
    padding:18px 20px;
    cursor:pointer;
    transition:.3s;
    padding:18px 20px;
    transition:var(--transition);
    border-bottom:1px solid #F4F4F4;
}

.conversation:hover{
    background:var(--primary-light);
}

.conversation.active{
    background:var(--primary-light);
    border-left:4px solid var(--primary);
}

.conversation img{
    width:50px;
    height:50px;
    border-radius:50%;
    object-fit:cover;
}

.conversation h4{
    margin:0;
    color:#1F2937;
}

.conversation p{
    margin:3px 0 0;
    color:#6B7280;
    font-size:14px;
}

.conversation span{
    margin-left:auto;
    color:#9CA3AF;
    font-size:13px;
}

.chat-window{
    display:flex;
    flex-direction:column;
    min-width:0;
    width:100%;
    height:100dvh;
}

/* Chat Header */
.chat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 20px;
    background:#fff;
    border-bottom:1px solid var(--border);
    flex-wrap:nowrap;          /* Never wrap */
    overflow:hidden;
}

/* Menu Container */
.chat-menu{
    position:relative;
}

/* Three-dot Button */
.menu-btn{
    width:42px;
    height:42px;
    border:none;
    outline:none;
    background:transparent;
    border-radius:12px;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:var(--transition);
}

.menu-btn i{
    font-size:18px;
    color:var(--text-muted);
}

.menu-btn:hover{
    background:var(--primary-light);
}

.menu-btn:hover i{
    color:var(--primary);
}

/* Dropdown */
.menu-dropdown{
    position:absolute;
    top:48px;
    right:0;
    width:210px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:16px;
    box-shadow:var(--shadow-lg);
    overflow:hidden;
    display:none;
    z-index:1000;
}

/* Show Menu */
.menu-dropdown.show{
    display:block;
}

/* Menu Items */
.menu-dropdown a{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 18px;
    text-decoration:none;
    color:var(--text-main);
    font-size:14px;
    font-weight:500;
    transition:.2s;
}

.menu-dropdown a:hover{
    background:var(--primary-light);
    color:var(--primary);
}

.menu-dropdown a i{
    width:18px;
}

.chat-header h3{
    color:var(--primary);
    font-size:18px;
}

.chat-header small{
    color:var(--green-dark);
    font-weight:600;
}

.user{
    display:flex;
    align-items:center;
    gap:12px;
    flex:1;
    min-width:0;
    position:relative;
}

.user::after{
    content:"";
    width:10px;
    height:10px;
    background:var(--green-dark);
    border-radius:50%;
    border:2px solid #fff;
    position:absolute;
    left:38px;
    bottom:4px;
}

/* Avatar */
.user img{
    width:48px;
    height:48px;
    border-radius:50%;
    flex-shrink:0;
}

/* Text */
.user div{
    min-width:0;
    flex:1;
}

.user h3{
    margin:0;
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.user small{
    display:block;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--success);
}

/* Fixed width buttons */
.back-btn,
.chat-menu{
    flex-shrink:0;
}

.menu-btn{
    width:42px;
    height:42px;
}

.messages{

    flex:1;
    padding:30px;
    overflow:auto;

}

.message{

    width:fit-content;
    max-width:65%;
    padding:14px 18px;
    margin-bottom:15px;
    border-radius:18px;
    line-height:1.5;

}

.sent{
    background:var(--primary);
    color:#fff;
    border-bottom-right-radius:6px;
}

.received{
    background:var(--primary-light);
    color:var(--text-main);
    border:1px solid rgba(11,82,91,.08);
}

.chat-input{
    display:flex;
    align-items:center;
    gap:15px;
    background:#fff;
    border-top:1px solid var(--border);
    padding:18px 24px;
}

.chat-input input{
    border:1px solid var(--border);
    background:var(--bg-body);
    border-radius:14px;
    padding:14px 18px;
    font-family:inherit;
    flex:1;
    outline:none;
}

.chat-input input:focus{
    border-color:var(--primary);
}

.chat-input button{
    background:var(--accent);
    color:#fff;
    width:48px;
    height:48px;
    border-radius:14px;
    transition:var(--transition);
    cursor:pointer;
}

.chat-input button:hover{
    background:var(--primary);
}

.chat-list{
    flex:1;
    background:#fff;
    border:1px solid var(--border);
    border-radius:20px;
    overflow-y:auto;
    box-shadow:var(--shadow-sm);
}

.message{
    animation:fadeUp .25s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.conversation{
    transition:all .25s ease;
}

.conversation:hover{
    transform:translateX(4px);
}

/* Sidebar */
.sidebar{
    width:var(--sidebar-width);
    transition:width .3s ease;
}

/* When collapsed */
.dashboard-container.sidebar-collapsed{
    --sidebar-width:72px;
}


/* Hide sidebar text */
.sidebar.collapsed .logo-img,
.sidebar.collapsed .nav-item span,
.sidebar.collapsed .badge,
.sidebar.collapsed .nav-logout span{
    display:none;
}

.sidebar.collapsed .nav-item a,
.sidebar.collapsed .nav-logout a{
    justify-content:center;
    padding:14px;
}

/* Arrow */
.sidebar-arrow{
    position: fixed;
    right:-14px;
    top:50%;
    left:calc(var(--sidebar-width));
    transform:translateY(-50%);
    width:28px;
    height:60px;
    background:#fff;
    border:1px solid var(--border);
    border-left:none;
    border-radius:0 12px 12px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:99999;
    transform:translateY(-50%);
    transition:left .3s ease;
    left:var(--sidebar-width);
}

.send-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    background:var(--primary);
    color:#fff;
    cursor:pointer;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:.3s;
}

.send-btn:hover{
    background:var(--primary-hover);
    transform:scale(1.05);
}

.send-btn i{
    font-size:18px;
}

.attach-btn{
    width:48px;
    height:48px;
    border:none;
    border-radius:14px;
    background:#fff;
    color:var(--text-muted);
    border:1px solid var(--border);
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:all .3s ease;
}

.attach-btn i{
    font-size:18px;
}

.attach-btn:hover{
    background:var(--primary-hover);
    transform:scale(1.05);
}

.back-btn{
    width:42px;
    height:42px;
    border:none;
    outline:none;
    border-radius:12px;
    background:transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    transition:var(--transition);
    flex-shrink:0;
}

.back-btn i{
    font-size:18px;
    color:var(--text-muted);
}

.back-btn:hover{
    background:var(--primary-light);
}

.back-btn:hover i{
    color:var(--primary);
}

/* ---------- Desktop ---------- */

.dashboard-container{
    --sidebar-width:272px;
    --conversation-width:360px;
    display:grid;
    grid-template-columns:
        var(--sidebar-width)
        var(--conversation-width)
        minmax(0,1fr);
    width:100%;
    height:100vh;
}

.dashboard-container.sidebar-collapsed{
    --sidebar-width:72px;
}

/* ---------- Large Tablet ---------- */

@media (max-width:1200px){

.dashboard-container{
    --sidebar-width:72px;
    --conversation-width:320px;
}

.sidebar{
    width:72px;
}

.sidebar .logo-img,
.sidebar .nav-item span,
.sidebar .badge,
.sidebar .nav-logout span{
    display:none;
}

.sidebar .nav-item a,
.sidebar .nav-logout a{
    justify-content:center;
}

.conversation-panel{
    width:100%;
    min-width:0;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.back-btn{
    display:flex;
}

}

/* ---------- Tablet ---------- */

@media (max-width:991px){

.dashboard-container{
    --sidebar-width:272px;
    --conversation-width:360px;
}

.dashboard-container.sidebar-collapsed{
    --sidebar-width:0px;
    --conversation-width:minmax(320px,1fr);
    grid-template-columns:
        72px
        360px
        minmax(0,1fr);
}

.sidebar{
    width:72px;
}

.conversation-panel{
    width:100%;
    min-width:0;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

.chat-window{
    display:flex;
    flex-direction:column;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.back-btn{
    display:flex;
}

}

/* ---------- Mobile ---------- */

@media (max-width:768px){

.dashboard-container{
    display:block;
    width:100%;
    height:100vh;
    overflow:hidden;
}

.dashboard-container.sidebar-collapsed{
    --sidebar-width:0px;
    --conversation-width:minmax(320px,1fr);
}

.sidebar{
    position:fixed;
    top:0;
    left:-72px;
    width:72px;
    height:100vh;
    z-index:1000;
    transition:left .3s ease;
    background:#fff;
}

.sidebar.open{
    left:0;
}

.sidebar-arrow{
    left:20px;
    z-index:1100;
}

.sidebar.open + .sidebar-arrow{
    left:72px;
}

.conversation-panel{
    width:100%;
    min-width:0;
    overflow:hidden;
    flex-direction:column;
}

.chat-window{
    flex-direction:column;
    width:100%;
    min-width:0;
    overflow:hidden;
}

.conversation-panel{
    display:flex;
    width:100%;
}

.chat-window{
    display:none;
    width:100%;
}

.chat-window.active{
    display:flex;
}

.conversation-panel.hide{
    display:none;
}
}

/* ---------- Very Small Phones ---------- */

@media(max-width:480px){

.search-box{
    padding:10px;
}

.conversation{
    padding:12px;
}

.conversation img{
    width:40px;
    height:40px;
}

.back-btn{
    display:flex;
}

}
    </style>
</head>

<script>
const sidebar = document.querySelector(".sidebar");
const dashboard = document.querySelector(".dashboard-container");
const arrow = document.getElementById("sidebarArrow");

arrow.addEventListener("click", () => {
    if (window.innerWidth <= 768) {
        sidebar.classList.toggle("open");
    } else {
        sidebar.classList.toggle("collapsed");
        dashboard.classList.toggle("sidebar-collapsed");

    }
    arrow.classList.toggle("collapsed");
});

    const icon = arrow.querySelector("i");

    if(sidebar.classList.contains("collapsed")){

        icon.classList.replace("fa-chevron-left","fa-chevron-right");

    }else{

        icon.classList.replace("fa-chevron-right","fa-chevron-left");

    }

</script>
<script>
    lucide.createIcons();

    // Modern Messaging System Scripting

    const chatListContainer = document.getElementById("chatListContainer");
    const messagesContainer = document.querySelector(".messages");
    const searchChatInput = document.getElementById("searchChatInput");
    const input = document.querySelector(".chat-input input[type='text']");
    const sendBtn = document.querySelector(".chat-input .send-btn");
    const attachBtn = document.getElementById("attachBtn");
    const fileInput = document.getElementById("fileInput");

    let activePartner = "";
    let localConversations = [];

    // Initialize list of conversations dynamically using data from mentor.js (teachers)
    async function loadConversations() {
        console.log("loadConversations called");
        if (!window.teachers) return;

        // Fetch conversations from API or LocalStorage
        console.log(AppService);
        const apiConvs = await AppService.getConversations();

        chatListContainer.innerHTML = "";
        
        teachers.forEach(teacher => {
            const apiConv = apiConvs.find(c => c.partner === teacher.name);
            const lastMsg = apiConv ? apiConv.lastMessage : (teacher.description || "No messages yet");
            const unread = apiConv ? apiConv.unreadCount : 0;
            const isOnline = teacher.id % 2 === 1; // Odd IDs online, even offline

            const isActive = teacher.name === activePartner ? "active" : "";

            const convHTML = `
                <div class="conversation ${isActive}" data-name="${teacher.name}" onclick="selectConversation('${teacher.name}', '${teacher.image}', ${isOnline})">
                    <img src="${teacher.image}" alt="${teacher.name}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover;">
                    <div style="flex: 1; min-width: 0; padding-left: 10px;">
                        <h4 style="font-weight: 700; color: var(--text-main); margin-bottom: 2px;">${teacher.name}</h4>
                        <p style="font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${lastMsg}</p>
                    </div>
                    <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 5px;">
                        <span style="font-size: 11px; color: var(--text-muted);">${isOnline ? "online" : "offline"}</span>
                        ${unread > 0 ? `<span class="badge" style="background-color: var(--accent); color: white; border-radius: 50%; font-size: 10px; font-weight: 700; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center;">${unread}</span>` : ""}
                    </div>
                </div>
            `;
            chatListContainer.innerHTML += convHTML;
        });

        if (!activePartner && teachers.length > 0) {
            // Default select first teacher
            const first = teachers[0];
            selectConversation(first.name, first.image, true);
        }
    }

    // Select Active Conversation — exposed globally for inline onclick
    window.selectConversation = async function selectConversation(name, image, isOnline) {
        activePartner = name;
        
        // Mark messages as read — try API first, always update localStorage too
        const currentUser = localStorage.getItem("userName") || "Gyan Prakash";
        if (window.AppService) {
            // Try API (won't throw even if offline — apiCall returns null)
            await AppService.apiCall("/messages/read", {
                method: "PUT",
                body: JSON.stringify({ sender: name, recipient: currentUser })
            });

            // Always mark in localStorage regardless of API result
            let localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
            let changed = false;
            localMsgs = localMsgs.map(m => {
                if (m.sender === name && m.recipient === currentUser && !m.is_read) {
                    changed = true;
                    return { ...m, is_read: true };
                }
                return m;
            });
            if (changed) {
                localStorage.setItem("local_messages", JSON.stringify(localMsgs));
            }

            // Immediately zero-out the badge on the conversation row in the sidebar
            const convRow = document.querySelector(`.conversation[data-name="${name}"]`);
            if (convRow) {
                const dot = convRow.querySelector(".badge");
                if (dot) dot.style.display = "none";
            }

            // Refresh global nav + topbar badges
            AppService.updateGlobalBadges();
        }

        // Highlight in list
        document.querySelectorAll(".conversation").forEach(c => {
            if (c.dataset.name === name) c.classList.add("active");
            else c.classList.remove("active");
        });

        // Update Chat Header
        const chatHeader = document.querySelector(".chat-header");
        if (chatHeader) {
            const img = chatHeader.querySelector(".user img");
            const h3 = chatHeader.querySelector(".user h3");
            const small = chatHeader.querySelector(".user small");
            
            if (img) img.src = image;
            if (h3) h3.textContent = name;
            if (small) {
                small.textContent = isOnline ? "Online" : "Offline";
                small.style.color = isOnline ? "var(--green-dark)" : "var(--text-muted)";
            }
        }

        // Load chat history
        loadChatHistory();
        if(window.innerWidth <= 768){
            document.querySelector(".conversation-panel").classList.add("hide");
            document.querySelector(".chat-window").classList.add("active");
        }
    }

    // Load Message History
    async function loadChatHistory() {
        if (!activePartner) return;
        messagesContainer.innerHTML = "";

        const messages = await AppService.getMessages(activePartner);
        const currentUser = localStorage.getItem("userName") || "Gyan Prakash";

        if (messages.length === 0) {
            messagesContainer.innerHTML = `
                <div style="text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px;">
                    No messages yet. Send a message to start the conversation!
                </div>
            `;
            return;
        }

        messages.forEach(msg => {
            const isSent = msg.sender === currentUser;
            const msgClass = isSent ? "sent" : "received";
            const time = msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";

            let attachmentsHTML = "";
            if (msg.attachments && msg.attachments.length > 0) {
                msg.attachments.forEach(att => {
                    if (att.fileType && att.fileType.startsWith("image/")) {
                        attachmentsHTML += `<img src="${att.url}" class="chat-image" style="max-width: 220px; border-radius: 12px; display: block; margin-bottom: 5px;">`;
                    } else {
                        attachmentsHTML += `
                            <div style="display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; font-size: 13px;">
                                <i class="fa-solid fa-file-pdf" style="color: var(--red-dark); font-size: 16px;"></i>
                                <span style="font-weight: 600; text-decoration: underline; cursor: pointer;" onclick="window.open('${att.url}')">${att.name}</span>
                            </div>
                        `;
                    }
                });
            }

            const starHTML = msg.starred ? `<i class="fa-solid fa-star" style="color: var(--accent); font-size: 10px; margin-right: 4px;"></i>` : "";
            const pinHTML = msg.pinned ? `<i class="fa-solid fa-thumbtack" style="color: var(--primary); font-size: 10px; margin-right: 4px; transform: rotate(45deg);"></i>` : "";

            const reactionsHTML = msg.reactions && msg.reactions.length > 0 ? `
                <div class="reactions" style="display: flex; gap: 4px; margin-top: 4px;">
                    ${msg.reactions.map(r => `<span style="background: rgba(0,0,0,0.05); border-radius: 99px; padding: 2px 6px; font-size: 11px;">${r.emoji}</span>`).join("")}
                </div>
            ` : "";

            const msgHTML = `
                <div class="message ${msgClass}" style="position: relative; margin-bottom: 12px; max-width: 70%;" data-id="${msg._id || msg.id}">
                    <div class="msg-bubble" style="padding: 10px 14px; border-radius: 14px; background-color: ${isSent ? 'var(--primary)' : 'var(--bg-body)'}; color: ${isSent ? 'white' : 'var(--text-main)'}; position: relative;">
                        ${attachmentsHTML}
                        ${msg.text ? `<div style="word-break: break-word;">${msg.text}</div>` : ""}
                        <small style="display: flex; justify-content: flex-end; align-items: center; font-size: 10px; opacity: 0.7; margin-top: 5px;">
                            ${pinHTML}
                            ${starHTML}
                            ${time}
                        </small>
                    </div>
                    ${reactionsHTML}
                    <div class="msg-options" style="position: absolute; top: 50%; ${isSent ? 'left: -90px;' : 'right: -90px;'} transform: translateY(-50%); display: none; gap: 5px; z-index: 10;">
                        <button onclick="toggleStarMessage('${msg._id || msg.id}')" style="background: white; border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;"><i class="fa-regular fa-star" style="font-size: 11px;"></i></button>
                        <button onclick="togglePinMessage('${msg._id || msg.id}')" style="background: white; border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;"><i class="fa-solid fa-thumbtack" style="font-size: 11px;"></i></button>
                        <button onclick="reactToMessage('${msg._id || msg.id}', '❤️')" style="background: white; border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;">❤️</button>
                        <button onclick="deleteMessage('${msg._id || msg.id}')" style="background: white; border: 1px solid var(--border); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--red-dark);"><i class="fa-regular fa-trash-can" style="font-size: 11px;"></i></button>
                    </div>
                </div>
            `;
            messagesContainer.innerHTML += msgHTML;
        });

        // Add hover triggers for message options
        document.querySelectorAll(".message").forEach(msgElement => {
            msgElement.addEventListener("mouseenter", () => {
                const opt = msgElement.querySelector(".msg-options");
                if (opt) opt.style.display = "flex";
            });
            msgElement.addEventListener("mouseleave", () => {
                const opt = msgElement.querySelector(".msg-options");
                if (opt) opt.style.display = "none";
            });
        });

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Send Message Trigger
    async function handleSend() {
        const text = input.value.trim();
        if (!activePartner) {
            alert("Please select a conversation first.");
            return;
        }
        if (!text && fileInput.files.length === 0) return;

        const attachments = [];
        if (fileInput.files.length > 0) {
            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onloadend = async () => {
                attachments.push({
                    name: file.name,
                    url: reader.result,
                    fileType: file.type,
                    size: file.size
                });
                await AppService.sendMessage(activePartner, text, attachments);
                input.value = "";
                fileInput.value = "";
                loadChatHistory();
                loadConversations();
                simulateFakeReply();
            };
            reader.readAsDataURL(file);
        } else {
            await AppService.sendMessage(activePartner, text);
            input.value = "";
            loadChatHistory();
            loadConversations();
            simulateFakeReply();
        }
    }

    // Simulate Smart Reply with Typing Indicator
    function simulateFakeReply() {
        const typingDiv = document.createElement("div");
        typingDiv.className = "message received typing-indicator-msg";
        typingDiv.innerHTML = `
            <div style="background-color: var(--bg-body); padding: 10px 14px; border-radius: 14px; display: inline-block;">
                <span class="dot" style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-muted); margin-right: 3px; animation: bounce 1.4s infinite both;"></span>
                <span class="dot" style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-muted); margin-right: 3px; animation: bounce 1.4s infinite both; animation-delay: .2s;"></span>
                <span class="dot" style="display: inline-block; width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-muted); animation: bounce 1.4s infinite both; animation-delay: .4s;"></span>
            </div>
        `;
        typingDiv.style.marginBottom = "12px";
        typingDiv.style.maxWidth = "70%";
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Vary the reply delay to feel more human (1.5s – 3s)
        const delay = 1500 + Math.floor(Math.random() * 1500);

        setTimeout(async () => {
            document.querySelectorAll(".typing-indicator-msg").forEach(el => el.remove());

            // Pick reply pool based on time of day
            const hour = new Date().getHours();
            let pool;

            if (hour < 12) {
                // Morning
                pool = [
                    "Good morning! 🌅 I've noted your message and will get back to you shortly.",
                    "Namaste 🙏 Received your message. Let's connect after the morning session.",
                    "Good morning! Please have patience — I'll respond in detail after practice.",
                    "Morning! Give me a moment to finish the current class and I'll reply fully.",
                    "I've seen your message. Please check the Resources page for related guides while you wait."
                ];
            } else if (hour < 17) {
                // Afternoon
                pool = [
                    "Thank you for reaching out! I'm reviewing your message now.",
                    "Got it! I'll get back to you with a detailed response after the afternoon session.",
                    "Received 🙏 Please refer to the shared materials on the Resources page for now.",
                    "I appreciate your message. Let's schedule a quick call if needed — I'm usually available at 5 PM.",
                    "Message received. I'll respond soon — great question by the way! Keep exploring.",
                    "Good progress! Keep practicing and I'll give you more guidance shortly."
                ];
            } else {
                // Evening / Night
                pool = [
                    "I've received your message. 🙏 I'll follow up first thing tomorrow morning.",
                    "Thank you! Evening sessions are ongoing — will respond in detail tonight or early morning.",
                    "Namaste! Got your message. Please rest well and we can discuss tomorrow.",
                    "Received your message. Let's connect tomorrow — rest is part of the practice too! 🌙",
                    "Thank you for writing. I'll get back to you by tomorrow morning at the latest."
                ];
            }

            // Additionally, pick a personalised prefix based on teacher role
            const teacher = window.teachers ? window.teachers.find(t => t.name === activePartner) : null;
            let prefix = "";
            if (teacher) {
                if (teacher.role === "Founder") prefix = "As the Founder, I want to personally assure you — ";
                else if (teacher.role === "Master Teacher") prefix = "From my experience as a Master Teacher — ";
                else if (teacher.role === "Yoga Instructor") prefix = "As your instructor — ";
            }

            const baseReply = pool[Math.floor(Math.random() * pool.length)];
            const randomReply = prefix ? prefix + baseReply.charAt(0).toLowerCase() + baseReply.slice(1) : baseReply;

            // Save reply
            const currentUser = localStorage.getItem("userName") || "Gyan Prakash";
            const replyMsg = {
                sender: activePartner,
                recipient: currentUser,
                text: randomReply
            };

            if (AppService.isOnline) {
                await AppService.apiCall("/messages/send", {
                    method: "POST",
                    body: JSON.stringify(replyMsg)
                });
                await AppService.apiCall("/notifications/create", {
                    method: "POST",
                    body: JSON.stringify({
                        user: currentUser,
                        title: `New Message from ${activePartner}`,
                        type: "message",
                        content: randomReply
                    })
                });
            } else {
                const localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
                localMsgs.push({
                    _id: "msg_" + Date.now(),
                    ...replyMsg,
                    createdAt: new Date().toISOString(),
                    is_read: false
                });
                localStorage.setItem("local_messages", JSON.stringify(localMsgs));

                const localNotifs = JSON.parse(localStorage.getItem("local_notifications") || "[]");
                localNotifs.push({
                    _id: "notif_" + Date.now(),
                    user: currentUser,
                    title: `New Message from ${activePartner}`,
                    type: "message",
                    content: randomReply,
                    is_read: false,
                    createdAt: new Date().toISOString()
                });
                localStorage.setItem("local_notifications", JSON.stringify(localNotifs));
            }

            loadChatHistory();
            loadConversations();
            AppService.updateGlobalBadges();

        }, delay);
    }

    // Toggle Pin Message
    window.togglePinMessage = async (id) => {
        if (window.AppService) {
            await AppService.apiCall(`/messages/pin/${id}`, { method: "PUT" });
        } else {
            let localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
            localMsgs = localMsgs.map(m => (m._id === id || m.id === id) ? { ...m, pinned: !m.pinned } : m);
            localStorage.setItem("local_messages", JSON.stringify(localMsgs));
        }
        loadChatHistory();
    };

    // Toggle Star Message
    window.toggleStarMessage = async (id) => {
        if (window.AppService) {
            await AppService.apiCall(`/messages/star/${id}`, { method: "PUT" });
        } else {
            let localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
            localMsgs = localMsgs.map(m => (m._id === id || m.id === id) ? { ...m, starred: !m.starred } : m);
            localStorage.setItem("local_messages", JSON.stringify(localMsgs));
        }
        loadChatHistory();
    };

    // Delete Message
    window.deleteMessage = async (id) => {
        if (confirm("Delete this message?")) {
            if (window.AppService) {
                await AppService.apiCall(`/messages/delete/${id}`, { method: "DELETE" });
            } else {
                let localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
                localMsgs = localMsgs.filter(m => m._id !== id && m.id !== id);
                localStorage.setItem("local_messages", JSON.stringify(localMsgs));
            }
            loadChatHistory();
            loadConversations();
        }
    };

    // React To Message
    window.reactToMessage = async (id, emoji) => {
        const currentUser = localStorage.getItem("userName") || "Gyan Prakash";
        if (window.AppService) {
            await AppService.apiCall(`/messages/react/${id}`, {
                method: "PUT",
                body: JSON.stringify({ user: currentUser, emoji })
            });
        } else {
            let localMsgs = JSON.parse(localStorage.getItem("local_messages") || "[]");
            localMsgs = localMsgs.map(m => {
                if (m._id === id || m.id === id) {
                    const reactions = m.reactions || [];
                    const idx = reactions.findIndex(r => r.user === currentUser);
                    if (idx > -1) {
                        if (reactions[idx].emoji === emoji) reactions.splice(idx, 1);
                        else reactions[idx].emoji = emoji;
                    } else {
                        reactions.push({ user: currentUser, emoji });
                    }
                    return { ...m, reactions };
                }
                return m;
            });
            localStorage.setItem("local_messages", JSON.stringify(localMsgs));
        }
        loadChatHistory();
    };

    // Attach File Trigger
    attachBtn.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", handleSend);

    // Send on button or Enter
    sendBtn.addEventListener("click", handleSend);
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") handleSend();
    });

    // Search Conversations
    if (searchChatInput) {
        searchChatInput.addEventListener("keyup", function () {
            const val = this.value.toLowerCase();
            document.querySelectorAll(".conversation").forEach(c => {
                const name = c.querySelector("h4").textContent.toLowerCase();
                c.style.display = name.includes(val) ? "flex" : "none";
            });
        });
    }

    // Mobile Back Button
    const backBtn = document.querySelector(".back-btn");
    if (backBtn) {
        backBtn.addEventListener("click",()=>{
            document.querySelector(".chat-window").classList.remove("active");
            document.querySelector(".conversation-panel").classList.remove("hide");
        });
    }

    // Initialize list
    document.addEventListener("DOMContentLoaded", () => {
        loadConversations();
    });
</script>
<style>
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1.0); }
    }
</style>
